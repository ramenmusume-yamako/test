<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>走れ！ラーメン娘！！</title>
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background: #2c3e50; 
            display: flex; align-items: center; justify-content: center;
            width: 100vw; 
            height: 100dvh; 
            touch-action: none;
            font-family: sans-serif;
            box-sizing: border-box;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        canvas { 
            background: #ecf0f1; 
            display: block;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            max-width: 100%; 
            max-height: 100%;
            width: auto; 
            height: auto;
            object-fit: contain;
        }
        #ui { 
            position: absolute; 
            z-index: 100;
            pointer-events: none; 
            color: #2c3e50; 
            font-weight: bold;
            background: rgba(255,255,255,0.6); 
            padding: 5px 10px; 
            font-size: 18px; 
            border-radius: 5px;
            display: none;
        }
        @media (max-width: 959px) {
            #ui { font-size: 12px; padding: 3px 6px; }
        }
    </style>
</head>
<body>
    <div id="ui">BEST: 0<br>SCORE: 0</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');

        const isPC = window.innerWidth >= 960;

        // スマホ描画負荷対策
        const V_WIDTH = 1280;
        const V_HEIGHT = 720;
        const scaleRatio = isPC ? 1.0 : 0.5; 
        
        canvas.width = V_WIDTH * scaleRatio;
        canvas.height = V_HEIGHT * scaleRatio;

        // --- オーディオ設定 ---
        const bgm = new Audio('CHINA_BOY.mp3'); 
        bgm.loop = true;                  
        bgm.volume = 0.5;                 

        const seStart = new Audio('dora.mp3'); 
        seStart.volume = 1.0; 

        const seChashu = new Audio('チャーシュー.mp3');
        seChashu.preload = 'auto';
        seChashu.volume = 1.0;

        // --- 画像読み込み ---
        const pImgL = new Image(); const pImgR = new Image();
        pImgL.src = 'meanal.png'; pImgR.src = 'meanar.png';
        let pReadyCount = 0; pImgL.onload = pImgR.onload = () => { pReadyCount++; };

        const bgImages = [];
        const bgSrcs = ['bg1.jpg', 'bg2.jpg', 'bg3.jpg'];
        let bgReadyCount = 0; let bgScroll = 0;
        bgSrcs.forEach((src, index) => {
            bgImages[index] = new Image(); bgImages[index].src = src;
            bgImages[index].onload = () => { bgReadyCount++; };
        });

        const imgNaruto = new Image();   imgNaruto.src = 'naruto.png';
        const imgMenma = new Image();    imgMenma.src = 'menma.png';
        const imgNori = new Image();     imgNori.src = 'nori.png';
        
        const imgChashu = new Image();   
        imgChashu.src = 'tya-syu-.png'; 
        imgChashu.onload = () => {
            if (typeof imgChashu.decode === 'function') {
                imgChashu.decode().catch(() => {});
            }
        };

        const imgStartCallBg = new Image(); 
        imgStartCallBg.src = 'start_bg.png';

        // --- 設定値 ---
        const p_sz = isPC ? 220 : 260; 
        const GROUND_Y = V_HEIGHT - 60; 

        const BASE_GRAVITY = isPC ? 1.2 : 1.8; 
        const BASE_JUMP = isPC ? -26.0 : -35.0; 

        let gameState = 'START';
        let score = 0;
        let displayScore = 0; 
        let countTimer = 0;   
        let startCallTimer = 0; 
        let gameOverTimer = 0; 
        
        let isPageVisible = true;
        let lastTime = performance.now();

        const DIFFICULTY = 'normal'; 
        const deviceType = isPC ? 'PC' : 'SP';
        const bestKey = `dinoBestTime_${DIFFICULTY}_${deviceType}`;
        const scoreKey = `dinoTopScores_${DIFFICULTY}_${deviceType}`;

        let highScore = localStorage.getItem(bestKey) || 0;
        let topScores = JSON.parse(localStorage.getItem(scoreKey)) || [0, 0, 0];

        const initialBaseSpeed = isPC ? 10.0 : 15.0; 
        let currentSpeed = initialBaseSpeed;

        let speedPhaseTimer = 0;      
        let nextResetThreshold = 0;   

        let chashuTimer = 0; 
        let nextChashuTriggerTime = 0; 
        let hasChashuSpawnedThisPhase = false;
        
        let blindTimer = 0;          
        let blindPattern = 0;        
        const BLIND_DURATION = 480;  

        const player = { 
            x: 100, y: GROUND_Y - p_sz, width: p_sz, height: p_sz, 
            vy: 0, gravity: BASE_GRAVITY, isJumping: false, animTimer: 0
        };

        const obstacleTypes = [
            { id:'menma',  w: 110, h: 220, img: imgMenma },
            { id:'nori',   w: 220, h: 100, img: imgNori },
            { id:'naruto', w: 120, h: 120, img: imgNaruto }
        ];

        let obstacles = [];
        let spawnTimer = 0;
        let nextSpawnThreshold = 60; 

        // GC（メモリ回収）対策変数
        let _deltaTime = 0;
        let _dtRatio = 0;
        let _speedRatio = 0;
        let _mildRatio = 0;
        let _selectedType = null;
        let _requiredSpacing = 0;
        let _obs = null;
        let _pL = 0, _pR = 0, _pT = 0, _pB = 0;
        let _oL = 0, _oR = 0, _oT = 0, _oB = 0;

        function resize() {
            const rect = canvas.getBoundingClientRect();
            const offset = window.innerWidth >= 960 ? 20 : 10;
            ui.style.top = (rect.top + offset) + "px";
            ui.style.left = (rect.left + offset) + "px";
        }
        window.addEventListener('resize', resize);
        window.addEventListener('orientationchange', () => {
            setTimeout(resize, 200);
            setTimeout(resize, 500);
        });
        resize();

        function resetChashuPhase() {
            chashuTimer = 0;
            hasChashuSpawnedThisPhase = false;
            nextChashuTriggerTime = 5.0 + Math.random() * 30.0;
        }

        function setRandomResetThreshold() {
            const minFrames = 40 * 60;
            const maxFrames = 60 * 60;
            nextResetThreshold = minFrames + Math.random() * (maxFrames - minFrames);
            speedPhaseTimer = 0; 
            resetChashuPhase();
        }

        function saveScore(currentScore) {
            const finalScore = Math.floor(currentScore);
            if (finalScore > highScore) {
                highScore = finalScore;
                localStorage.setItem(bestKey, highScore);
            }
            topScores.push(finalScore);              
            topScores.sort((a, b) => b - a);         
            topScores = topScores.slice(0, 3);       
            localStorage.setItem(scoreKey, JSON.stringify(topScores)); 
        }

        const handleInput = (e) => {
            if (e.type === 'mousedown' && e.button === 0) return;
            if (e.code && !['Space', 'ArrowUp'].includes(e.code)) return;
            
            if (gameState === 'START') {
                seChashu.load();
                if (typeof imgChashu.decode === 'function') imgChashu.decode().catch(() => {});
                seStart.play().catch(o => {}); 
                resetGame();
                gameState = 'PLAYING';
                startCallTimer = 120; 
                ui.style.display = 'block';
                return;
            }
            
            if (gameState === 'GAMEOVER') {
                if (gameOverTimer > 0) return;
                if (displayScore < Math.floor(score)) {
                    displayScore = Math.floor(score);
                    return;
                }
                seStart.play().catch(o => {}); 
                resetGame();
                gameState = 'PLAYING';
                startCallTimer = 120; 
                ui.style.display = 'block';
                return;
            }

            if (gameState === 'PLAYING' && startCallTimer <= 0 && !player.isJumping) {
                player.isJumping = true;
                _speedRatio = currentSpeed / initialBaseSpeed;
                _mildRatio = 1.0 + (_speedRatio - 1.0) * 0.8; 
                player.vy = BASE_JUMP * _mildRatio;
            }
        };

        window.addEventListener('mousedown', handleInput);
        window.addEventListener('keydown', handleInput);
        window.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); }, {passive: false});

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                isPageVisible = false;
                if (gameState === 'PLAYING') bgm.pause();
            } else {
                isPageVisible = true;
                lastTime = performance.now(); 
                if (gameState === 'PLAYING' && startCallTimer <= 0) bgm.play().catch(o => {});
            }
        });

        function resetGame() {
            score = 0; 
            displayScore = 0; 
            countTimer = 0; 
            startCallTimer = 0; 
            gameOverTimer = 0; 
            currentSpeed = initialBaseSpeed;
            obstacles.length = 0; 
            spawnTimer = 0; 
            nextSpawnThreshold = 60;
            blindTimer = 0; 
            player.y = GROUND_Y - player.height; 
            player.vy = 0; 
            player.gravity = BASE_GRAVITY; 
            player.isJumping = false;
            
            lastTime = performance.now(); 
            setRandomResetThreshold(); 
        }

        function update(currentTime) {
            if (!currentTime) currentTime = performance.now();

            _deltaTime = currentTime - lastTime;
            lastTime = currentTime;

            if (!isPageVisible) {
                requestAnimationFrame(update);
                return;
            }

            if (_deltaTime > 100) {
                _deltaTime = 16.666;
            }

            _dtRatio = _deltaTime / (1000 / 60);

            if (gameState === 'PLAYING') {
                player.animTimer += _dtRatio; 

                if (blindTimer > 0) {
                    blindTimer -= _dtRatio;
                    if (blindTimer < 0) blindTimer = 0;
                }

                if (startCallTimer > 0) {
                    startCallTimer -= _dtRatio;
                    bgScroll += (initialBaseSpeed * 0.7) * _dtRatio;

                    if (startCallTimer <= 0) {
                        startCallTimer = 0;
                        bgm.play().catch(o => {});
                    }
                } else {
                    currentSpeed += (isPC ? 0.006 : 0.009) * _dtRatio; 
                    score += (1 / 60) * _dtRatio; 
                    chashuTimer += (1 / 60) * _dtRatio; 

                    if (chashuTimer >= 40.0) {
                        resetChashuPhase();
                    }

                    if (!hasChashuSpawnedThisPhase && (chashuTimer >= nextChashuTriggerTime || chashuTimer >= 35.0)) {
                        blindTimer = BLIND_DURATION;
                        blindPattern = Math.floor(Math.random() * 3); 
                        hasChashuSpawnedThisPhase = true;

                        seChashu.currentTime = 0;
                        seChashu.play().catch(o => {});
                    }
                    
                    bgScroll += (currentSpeed * 0.7) * _dtRatio; 

                    speedPhaseTimer += _dtRatio;
                    if (speedPhaseTimer >= nextResetThreshold) {
                        currentSpeed = initialBaseSpeed; 
                        setRandomResetThreshold();       
                    }

                    _speedRatio = currentSpeed / initialBaseSpeed;
                    _mildRatio = 1.0 + (_speedRatio - 1.0) * 0.8; 
                    player.gravity = BASE_GRAVITY * (_mildRatio * _mildRatio);

                    player.vy += player.gravity * _dtRatio;
                    player.y += player.vy * _dtRatio;

                    if (player.y > GROUND_Y - player.height) {
                        player.y = GROUND_Y - player.height;
                        player.vy = 0;
                        player.isJumping = false;
                    }

                    // --- 障害物出現計算 ---
                    spawnTimer += currentSpeed * _dtRatio;
                    if (spawnTimer > nextSpawnThreshold) {
                        _selectedType = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
                        obstacles.push({ x: V_WIDTH, y: GROUND_Y - _selectedType.h, ..._selectedType });
                        spawnTimer = 0;
                        
                        // ★スマホ版限定：障害物同士の間隔を大幅に広く設定（PCは380〜、スマホは650〜）
                        if (isPC) {
                            _requiredSpacing = 380 + (_speedRatio * 150); 
                            nextSpawnThreshold = _requiredSpacing + (Math.random() * 300);
                        } else {
                            _requiredSpacing = 650 + (_speedRatio * 180); 
                            nextSpawnThreshold = _requiredSpacing + (Math.random() * 500); // ランダムな隙間も広めに
                        }
                    }

                    for (let i = obstacles.length - 1; i >= 0; i--) {
                        _obs = obstacles[i];
                        _obs.x -= currentSpeed * _dtRatio;

                        _pL = player.x + player.width * 0.45; _pR = player.x + player.width * 0.55;
                        _pT = player.y + player.height * 0.3; _pB = player.y + player.height * 0.85;
                        _oL = _obs.x + _obs.w * 0.2;         _oR = _obs.x + _obs.w * 0.8;
                        _oT = _obs.y + _obs.h * 0.2;         _oB = _obs.y + _obs.h * 0.9;

                        if (_pL < _oR && _pR > _oL && _pT < _oB && _pB > _oT) {
                            gameState = 'GAMEOVER';
                            ui.style.display = 'none';
                            bgm.pause();
                            bgm.currentTime = 0;
                            seStart.currentTime = 0;
                            seStart.play().catch(o => {}); 

                            gameOverTimer = 120; 
                            saveScore(score);
                        }
                        if (_obs.x + _obs.w < -100) obstacles.splice(i, 1);
                    }
                }
                ui.innerHTML = `BEST: ${Math.floor(highScore)}<br>SCORE: ${Math.floor(score)}`;
            }

            if (gameState === 'GAMEOVER') {
                if (gameOverTimer > 0) {
                    gameOverTimer -= _dtRatio; 
                    if (gameOverTimer < 0) gameOverTimer = 0;
                } else {
                    if (displayScore < Math.floor(score)) {
                        countTimer += _dtRatio;
                        if (countTimer >= 4) {
                            displayScore += 1;
                            countTimer = 0;
                        }
                    }
                }
            }

            draw();
            requestAnimationFrame(update);
        }

        function drawStickyChashu(pattern, alpha) {
            if (!imgChashu.complete) return;
            ctx.save();
            ctx.globalAlpha = alpha;

            if (pattern === 0) {
                ctx.drawImage(imgChashu, 180 * scaleRatio, 380 * scaleRatio, 360 * scaleRatio, 270 * scaleRatio); 
                ctx.drawImage(imgChashu, 680 * scaleRatio, 280 * scaleRatio, 520 * scaleRatio, 390 * scaleRatio); 
            } 
            else if (pattern === 1) {
                ctx.drawImage(imgChashu, 260 * scaleRatio, 360 * scaleRatio, 280 * scaleRatio, 220 * scaleRatio); 
                ctx.drawImage(imgChashu, 740 * scaleRatio, 380 * scaleRatio, 280 * scaleRatio, 220 * scaleRatio); 
                ctx.drawImage(imgChashu, 440 * scaleRatio, 260 * scaleRatio, 440 * scaleRatio, 330 * scaleRatio); 
            } 
            else if (pattern === 2) {
                ctx.save();
                ctx.translate((V_WIDTH / 2) * scaleRatio, (V_HEIGHT / 2 + 60) * scaleRatio); 
                ctx.rotate(12 * Math.PI / 180); 
                ctx.drawImage(imgChashu, -400 * scaleRatio, -250 * scaleRatio, 800 * scaleRatio, 500 * scaleRatio);
                ctx.restore();
            }

            ctx.restore();
        }

        let _bgBaseX = 0;
        let _drawX = 0;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 背景描画（スケール対応）
            if (bgReadyCount > 0) {
                _bgBaseX = -(bgScroll % (V_WIDTH * 3));
                for (let j = 0; j < 2; j++) {
                    for (let i = 0; i < 3; i++) {
                        if (bgImages[i] && bgImages[i].complete) {
                            _drawX = _bgBaseX + (j * V_WIDTH * 3) + (i * V_WIDTH);
                            if (_drawX > -V_WIDTH && _drawX < V_WIDTH) {
                                ctx.drawImage(bgImages[i], _drawX * scaleRatio, 0, V_WIDTH * scaleRatio, V_HEIGHT * scaleRatio);
                            }
                        }
                    }
                }
            }
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillRect(0, GROUND_Y * scaleRatio, canvas.width, 4 * scaleRatio);

            if (pReadyCount === 2) {
                ctx.drawImage((Math.floor(player.animTimer / 30) % 2 === 0) ? pImgL : pImgR, player.x * scaleRatio, player.y * scaleRatio, player.width * scaleRatio, player.height * scaleRatio);
            }

            // 障害物描画（スケール対応）
            for (let i = 0; i < obstacles.length; i++) {
                _obs = obstacles[i];
                if (_obs.img && _obs.img.complete) ctx.drawImage(_obs.img, _obs.x * scaleRatio, _obs.y * scaleRatio, _obs.w * scaleRatio, _obs.h * scaleRatio);
            }

            if (gameState === 'PLAYING' && blindTimer > 0) {
                drawStickyChashu(blindPattern, (blindTimer < 60) ? (blindTimer / 60) : 1.0);
            }

            if (gameState === 'PLAYING' && startCallTimer > 0) {
                ctx.save();
                if (startCallTimer < 15) ctx.globalAlpha = startCallTimer / 15;
                if (imgStartCallBg.complete && imgStartCallBg.width > 0) {
                    ctx.drawImage(imgStartCallBg, (V_WIDTH / 2 - imgStartCallBg.width / 2) * scaleRatio, (V_HEIGHT / 2 - imgStartCallBg.height / 2) * scaleRatio, imgStartCallBg.width * scaleRatio, imgStartCallBg.height * scaleRatio);
                }
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#e74c3c'; 
                ctx.font = `bold ${Math.floor(90 * scaleRatio)}px sans-serif`;
                ctx.shadowColor = 'rgba(255, 255, 255, 0.8)';
                ctx.shadowBlur = 10 * scaleRatio;
                ctx.fillText('スタート！', (V_WIDTH / 2) * scaleRatio, (V_HEIGHT / 2) * scaleRatio);
                ctx.restore();
            }

            if (gameState === 'START' || gameState === 'GAMEOVER') {
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.textAlign = 'center';
                ctx.shadowBlur = 0;              
                
                if (gameState === 'START') {
                    ctx.textBaseline = 'alphabetic';
                    ctx.fillStyle = '#f1c40f'; ctx.font = `bold ${Math.floor(80 * scaleRatio)}px sans-serif`;
                    ctx.fillText('走れ！ラーメン娘！！', (V_WIDTH / 2) * scaleRatio, (V_HEIGHT / 2 - 100) * scaleRatio);
                    ctx.fillStyle = 'white'; ctx.font = `${Math.floor(30 * scaleRatio)}px sans-serif`;
                    ctx.fillText('スペースキー または タップでジャンプ！', (V_WIDTH / 2) * scaleRatio, (V_HEIGHT / 2 + 30) * scaleRatio);
                    ctx.font = `bold ${Math.floor(36 * scaleRatio)}px sans-serif`; ctx.fillStyle = '#f1c40f';
                    ctx.fillText('>> Press Space or Tap <<', (V_WIDTH / 2) * scaleRatio, (V_HEIGHT / 2 + 180) * scaleRatio);
                } else {
                    ctx.save();
                    let textY, fontSize, textX;
                    if (gameOverTimer > 0) {
                        ctx.textBaseline = 'middle';
                        textX = V_WIDTH / 2; textY = V_HEIGHT / 2; fontSize = 120; 
                    } else {
                        ctx.textBaseline = 'alphabetic';
                        textX = V_WIDTH / 2 - 220; textY = V_HEIGHT / 2 - 100; fontSize = 80;
                    }
                    ctx.fillStyle = '#e67e22'; ctx.font = `bold ${Math.floor(fontSize * scaleRatio)}px sans-serif`;
                    ctx.fillText('完 食', textX * scaleRatio, textY * scaleRatio);
                    ctx.restore();
                    
                    if (gameOverTimer === 0) {
                        ctx.save();
                        ctx.textAlign = 'center';
                        const leftCenterX = V_WIDTH / 2 - 220; 
                        ctx.fillStyle = 'white'; ctx.font = `${Math.floor(45 * scaleRatio)}px sans-serif`;
                        ctx.fillText(`記録: ${displayScore} 秒`, leftCenterX * scaleRatio, (V_HEIGHT / 2 + 10) * scaleRatio);
                        ctx.font = `${Math.floor(30 * scaleRatio)}px sans-serif`;
                        ctx.fillText(`最高記録: ${Math.floor(highScore)} 秒`, leftCenterX * scaleRatio, (V_HEIGHT / 2 + 65) * scaleRatio);
                        ctx.fillStyle = 'white';
                        if (displayScore >= Math.floor(score)) {
                            ctx.fillText('スペースキー または タップでリトライ！', leftCenterX * scaleRatio, (V_HEIGHT / 2 + 160) * scaleRatio);
                        } else {
                            ctx.fillStyle = '#7f8c8d'; ctx.font = `${Math.floor(24 * scaleRatio)}px sans-serif`;
                            ctx.fillText('画面タップで演出をスキップ', leftCenterX * scaleRatio, (V_HEIGHT / 2 + 160) * scaleRatio);
                        }

                        const rightCenterX = V_WIDTH / 2 + 260; 
                        const rankYStart = V_HEIGHT / 2 - 130;  
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
                        ctx.fillRect((rightCenterX - 200) * scaleRatio, (rankYStart - 60) * scaleRatio, 400 * scaleRatio, 310 * scaleRatio);
                        ctx.fillStyle = '#f1c40f'; ctx.font = `bold ${Math.floor(32 * scaleRatio)}px sans-serif`;
                        ctx.fillText('歴代最高記録 TOP3', rightCenterX * scaleRatio, (rankYStart - 15) * scaleRatio);
                        
                        const medals = ['🥇 1st', '🥈 2nd', '🥉 3rd'];
                        const medalColors = ['#f1c40f', '#e67e22', '#bdc3c7']; 
                        for (let i = 0; i < 3; i++) {
                            const currentY = rankYStart + 55 + (i * 65);
                            ctx.textAlign = 'left'; ctx.fillStyle = medalColors[i]; ctx.font = `bold ${Math.floor(30 * scaleRatio)}px sans-serif`;
                            ctx.fillText(medals[i], (rightCenterX - 150) * scaleRatio, currentY * scaleRatio);
                            ctx.textAlign = 'right'; ctx.fillStyle = 'white'; ctx.font = `bold ${Math.floor(32 * scaleRatio)}px font-serif`;
                            ctx.fillText(`${topScores[i]} 秒`, (rightCenterX + 150) * scaleRatio, currentY * scaleRatio);
                        }
                        ctx.restore();
                    }
                }
            }
        }
        
        window.addEventListener('load', resize);
        requestAnimationFrame(update);
    </script>
</body>
</html>
